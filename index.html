<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== EDIT: page title shown in the browser tab ===== -->
    <title>Haseeb Ahmed | AI Automation Engineer</title>
    <meta
      name="description"
      content="Portfolio of Haseeb Ahmed - AI Automation Engineer and Full-Stack Mobile Developer."
    />

    <!-- Distinctive fonts: Syne (display), Outfit (body), JetBrains Mono (code accents) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Sets the saved theme before the page paints, to avoid a flash. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          if (saved === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
